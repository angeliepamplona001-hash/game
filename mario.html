<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Word Memory & Avoid the Bomb</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #222; color: white; display: flex; flex-direction: column; align-items: center; }
        h1 { margin-top: 20px; color: #ffcc00; }
        
        /* 3x5 Grid Layout */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(5, 120px); 
            grid-template-rows: repeat(3, 150px); 
            gap: 15px; 
            margin-top: 20px;
        }

        .card {
            width: 120px;
            height: 150px;
            background-color: #444;
            border: 3px solid #666;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-weight: bold;
            text-align: center;
            font-size: 18px;
            position: relative;
            transition: transform 0.3s;
            user-select: none;
        }

        .card.flipped { background-color: #fff; color: #000; transform: rotateY(180deg); }
        .card.bomb { background-color: #ff4d4d !important; color: black; }
        .card.disabled { cursor: default; }

        /* Mario Coin Animation */
        .coin {
            position: absolute;
            width: 30px;
            height: 30px;
            background-color: #ffd700;
            border-radius: 50%;
            border: 2px solid #b8860b;
            top: -20px;
            left: 40px;
            animation: bounce 0.6s ease-out;
            display: none;
        }

        @keyframes bounce {
            0% { transform: translateY(0); opacity: 1; }
            50% { transform: translateY(-50px); opacity: 1; }
            100% { transform: translateY(-20px); opacity: 0; }
        }

        /* Bomb Shake Effect */
        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-3px, 0px) rotate(-1deg); }
            40% { transform: translate(3px, 2px) rotate(1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            80% { transform: translate(3px, -1px) rotate(1deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        #status { margin-top: 20px; font-size: 24px; }
        button { margin-top: 20px; padding: 10px 20px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

    <h1>Vocabulary Quest</h1>
    <div id="status">Score: 0</div>
    <div class="grid" id="gameGrid"></div>
    <button onclick="setupGame()">Reset Game</button>

    <audio id="coinSound" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>
    <audio id="bombSound" src="https://www.soundjay.com/free-music/sounds/explosion-01.mp3"></audio>

    <script>
        const words = ["Internet", "Cyber Bullying", "Information", "Fake News"];
        const gridElement = document.getElementById('gameGrid');
        const statusElement = document.getElementById('status');
        let score = 0;
        let gameOver = false;

        function setupGame() {
            gameOver = false;
            score = 0;
            statusElement.innerText = "Score: 0";
            gridElement.innerHTML = '';
            
            // Create deck: 14 words (randomly picked from list) + 1 bomb = 15 cards
            let deck = [];
            for (let i = 0; i < 14; i++) {
                deck.push(words[Math.floor(Math.random() * words.length)]);
            }
            deck.push("BOMB 💣");
            
            // Shuffle
            deck.sort(() => Math.random() - 0.5);

            deck.forEach(content => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.value = content;
                card.innerText = "?";
                
                const coin = document.createElement('div');
                coin.classList.add('coin');
                card.appendChild(coin);

                card.addEventListener('click', () => handleCardClick(card, coin));
                gridElement.appendChild(card);
            });
        }

        function handleCardClick(card, coin) {
            if (gameOver || card.classList.contains('flipped')) return;

            const val = card.dataset.value;
            card.innerText = val;
            card.classList.add('flipped');

            if (val === "BOMB 💣") {
                gameOver = true;
                card.classList.add('bomb');
                document.body.classList.add('shake');
                document.getElementById('bombSound').play();
                statusElement.innerText = "GAME OVER! You hit the bomb!";
                setTimeout(() => document.body.classList.remove('shake'), 500);
            } else {
                // Logic: Student reads it, then gets a coin
                // We show the coin after a slight delay to simulate "reading"
                setTimeout(() => {
                    if (!gameOver) {
                        coin.style.display = 'block';
                        document.getElementById('coinSound').play();
                        score++;
                        statusElement.innerText = `Score: ${score}`;
                    }
                }, 300);
            }
        }

        setupGame();
    </script>
</body>
</html>
